<title>مسیر آرامش | دوره‌های یوگا و مدیتیشن</title>
<link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/jalaali-js@1.2.6/dist/jalaali.min.js"></script>
<style>
   html {
    position: relative;
    min-height: 100%;
}

body {
    margin: 0;
   
}

footer {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 60px; /* ارتفاع فوتر خود را اینجا مشخص کنید */
}


.site-footer {
    text-align: center;
    padding: 20px;
    margin-top: auto; /* اگر مایلید همیشه پایین صفحه بماند */
    font-size: 0.9rem;
    color: var(--text-dim, #a79fbb); /* استفاده از متغیر متنی که در کدها دارید */
}

.site-footer a {
    color: var(--teal); /* یا هر رنگ شاخصی مثل گلد یا تال که در متغیرها تعریف کردید */
    text-decoration: none;
    font-weight: bold;
    transition: color 0.3s ease;
}

.site-footer a:hover {
    color: #ffffff; /* تغییر رنگ هنگام هاور */
    text-decoration: underline;
    text-decoration: none;
}
  :root{
    --bg:#100e0c;
    --card:#1d1812;
    --card2:#161209;
    --gold:#c9a24b;
    --gold-soft:#8a723a;
    --sage:#6f8f74;
    --ivory:#ece4d3;
    --line: rgba(201,162,75,0.18);
  }
  *{font-family:'Vazirmatn', sans-serif;}
  body{
    background:
      radial-gradient(1200px 600px at 15% -10%, rgba(201,162,75,0.08), transparent 60%),
      radial-gradient(1000px 500px at 100% 10%, rgba(111,143,116,0.07), transparent 55%),
      var(--bg);
    color:var(--ivory);
    min-height:100vh;
  }
  .brass-divider{ height:1px; background:linear-gradient(to left, transparent, var(--gold-soft), transparent); }
  .card{
    background:linear-gradient(180deg, rgba(255,255,255,0.02), transparent 40%), var(--card);
    border:1px solid var(--line);
    border-radius:1.1rem;
  }
  .subcard{
    background:var(--card2);
    border:1px solid var(--line);
    border-radius:0.9rem;
  }
  .clickable{ cursor:pointer; user-select:none; }
  .accordion-body{ max-height:0; overflow:hidden; transition:max-height 0.5s cubic-bezier(0.22,1,0.36,1); }
  .accordion-body.open{ max-height:6000px; }
  .ex-detail{ max-height:0; overflow:hidden; transition:max-height 0.4s ease; }
  .ex-detail.open{ max-height:800px; }
  .justify{ text-align:justify; text-justify:inter-word; }
  .chip{
    font-size:0.7rem; padding:0.15rem 0.6rem; border-radius:999px;
    border:1px solid var(--line); color:var(--gold); background:rgba(201,162,75,0.06);
    white-space:nowrap;
  }
  input[type=checkbox]{
    appearance:none; -webkit-appearance:none;
    width:1.6rem; height:1.6rem; border-radius:0.5rem;
    border:1.5px solid var(--gold-soft); background:rgba(0,0,0,0.2);
    cursor:pointer; position:relative; flex-shrink:0; transition:all 0.2s ease;
  }
  input[type=checkbox]:checked{ background:var(--gold); border-color:var(--gold); }
  input[type=checkbox]:checked::after{
    content:'✓'; position:absolute; inset:0; display:flex;
    align-items:center; justify-content:center; color:#100e0c; font-size:1rem; font-weight:700;
  }
  .done-strike{ text-decoration:line-through; opacity:0.5; }
  ::-webkit-scrollbar{width:6px;}
  ::-webkit-scrollbar-thumb{background:var(--gold-soft); border-radius:4px;}
  .mandala-ring circle{ transition:stroke-dashoffset 0.6s ease; }
  .chevron{ transition:transform 0.3s ease; }
  .chevron.rot{ transform:rotate(180deg); }
  .bar-track{ height:6px; border-radius:999px; background:rgba(255,255,255,0.06); overflow:hidden; }
  .bar-fill{ height:100%; border-radius:999px; background:linear-gradient(to left, var(--gold), #e8caa0); transition:width 0.5s ease; }
  input[type=date]{
    background:rgba(0,0,0,0.25); border:1px solid var(--line); border-radius:0.6rem;
    color:var(--ivory); font-size:0.75rem; padding:0.35rem 0.5rem; color-scheme:dark;
  }
  @media (prefers-reduced-motion: reduce){
    .accordion-body, .ex-detail, .chevron, .mandala-ring circle, .bar-fill{ transition:none !important; }
  }
</style>
</head>

<script>

      { title:'آگاهی باز و سکوت', subtitle:'روز هفتم', exercises:[

        { name:'یوگا نیدرای کامل', duration:'۱۵ دقیقه', howto:'دراز بکشید و طی یک اسکن آرام از تمام بدن، اجازه دهید هر عضو به‌طور کامل رها شود تا به حالتی بین بیداری و خواب برسید.', benefit:'جمع‌بندی نهایی هفت روز است؛ آرامشی عمیق که در عین حال کاملاً هوشیارانه است.' }

const STORAGE_KEY = 'yoga_meditation_checklist_v2';
const META_KEY = 'yoga_meditation_meta_v2';

function loadJSON(key){ try{ return JSON.parse(localStorage.getItem(key)) || {}; }catch(e){ return {}; } }
function saveJSON(key, val){ try{ localStorage.setItem(key, JSON.stringify(val)); }catch(e){} }

let state = loadJSON(STORAGE_KEY);
let meta = loadJSON(META_KEY);

function toPersianDigits(str){
  const map = {'0':'۰','1':'۱','2':'۲','3':'۳','4':'۴','5':'۵','6':'۶','7':'۷','8':'۸','9':'۹'};
  return String(str).replace(/[0-9]/g, d=>map[d]);
}

function exId(courseId, dayIdx, exIdx){ return `${courseId}_d${dayIdx}_e${exIdx}`; }

function courseTotal(course){ return course.days.reduce((sum,d)=>sum+d.exercises.length,0); }
function courseDone(course){
  let done = 0;
  course.days.forEach((day, dayIdx)=>{
    day.exercises.forEach((_, exIdx)=>{ if(state[exId(course.id, dayIdx, exIdx)]) done++; });
  });
  return done;
}
function dayProgress(course, dayIdx){
  const day = course.days[dayIdx];
  const done = day.exercises.filter((_,i)=>state[exId(course.id, dayIdx, i)]).length;
  return {done, total: day.exercises.length};
}
function overallProgress(){
  let total = 0, done = 0;
  COURSES.forEach(c=>{ total += courseTotal(c); done += courseDone(c); });
  return {total, done};
}
function updateOverallRing(){
  const {total, done} = overallProgress();
  const pct = total ? Math.round((done/total)*100) : 0;
  const circumference = 213.6;
  const offset = circumference - (circumference*pct/100);
  document.getElementById('progressCircle').style.strokeDashoffset = offset;
  document.getElementById('progressPct').textContent = toPersianDigits(pct) + '٪';
}
function toJalaliStr(date){
  const j = jalaali.toJalaali(date.getFullYear(), date.getMonth()+1, date.getDate());
  const months = ["فروردین","اردیبهشت","خرداد","تیر","مرداد","شهریور","مهر","آبان","آذر","دی","بهمن","اسفند"];
  return `${toPersianDigits(j.jd)} ${months[j.jm-1]} ${toPersianDigits(j.jy)}`;
}
function computeEndDate(startISO, durationDays){
  const start = new Date(startISO + 'T00:00:00');
  const end = new Date(start);
  end.setDate(end.getDate() + durationDays - 1);
  return end;
}
function renderJalaliDate(){
  document.getElementById('jalaliDate').textContent = toJalaliStr(new Date());
}

function renderCourses(){
  const container = document.getElementById('courses');
  container.innerHTML = '';

  COURSES.forEach((course)=>{
    const total = courseTotal(course);
    const done = courseDone(course);
    const pct = total ? Math.round((done/total)*100) : 0;
    const startISO = meta[course.id] && meta[course.id].start ? meta[course.id].start : '';
    let endLabel = '—';
    if(startISO){
      const endDate = computeEndDate(startISO, course.days.length);
      endLabel = toJalaliStr(endDate);
    }

    const courseEl = document.createElement('div');
    courseEl.className = 'card mb-6 overflow-hidden';
    courseEl.innerHTML = `
      <div class="clickable px-5 pt-5 pb-4" data-course-toggle="${course.id}">
        <div class="flex items-start justify-between gap-3 mb-3">
          <div class="min-w-0">
            <h2 class="font-bold text-[color:var(--ivory)]">${course.title}</h2>
            <p class="text-xs text-[color:var(--ivory)]/45 mt-1">${toPersianDigits(course.days.length)} روز · ${toPersianDigits(total)} تمرین</p>
          </div>
          <div class="flex items-center gap-2 flex-shrink-0">
            <span class="chip">${toPersianDigits(pct)}٪</span>
            <svg class="chevron w-4 h-4" style="color:var(--gold-soft)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M6 9l6 6 6-6"/>
            </svg>
          </div>
        </div>
        <p class="justify text-xs leading-6 text-[color:var(--ivory)]/60 mb-4">${course.description}</p>
        <div class="bar-track mb-4"><div class="bar-fill" style="width:${pct}%"></div></div>
        <div class="flex items-center gap-4 flex-wrap" onclick="event.stopPropagation()">
          <label class="flex items-center gap-2 text-xs text-[color:var(--ivory)]/60">
            شروع دوره:
            <input type="date" class="start-date-input" data-course="${course.id}" value="${startISO}">
          </label>
          <span class="text-xs text-[color:var(--ivory)]/60">پایان: <b class="text-[color:var(--gold)]" data-end-label="${course.id}">${endLabel}</b></span>
        </div>
      </div>
      <div class="accordion-body" data-course-body="${course.id}">
        <div class="px-5 pb-5 pt-1 space-y-3" data-days-container="${course.id}"></div>
      </div>
    `;
    container.appendChild(courseEl);

    const daysContainer = courseEl.querySelector(`[data-days-container="${course.id}"]`);
    course.days.forEach((day, dayIdx)=>{
      daysContainer.appendChild(renderDayCard(course, dayIdx, day));
    });
  });

  attachCourseListeners();
  attachDayListeners();
  attachExerciseListeners();
  attachDateListeners();
}

function renderDayCard(course, dayIdx, day){
  const {done, total} = dayProgress(course, dayIdx);
  const dayFull = done === total;
  const el = document.createElement('div');
  el.className = 'subcard overflow-hidden';
  el.innerHTML = `
    <div class="clickable flex items-center justify-between px-4 py-3" data-day-toggle="${course.id}_${dayIdx}">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-full flex items-center justify-center flex-shrink-0 border" data-day-badge="${course.id}_${dayIdx}" style="border-color:${dayFull ? 'var(--gold)' : 'var(--line)'}; background:${dayFull ? 'rgba(201,162,75,0.15)' : 'rgba(255,255,255,0.02)'}">
          <span class="text-xs font-bold" style="color:${dayFull ? 'var(--gold)' : 'var(--ivory)'}">${toPersianDigits(dayIdx+1)}</span>
        </div>
        <div>
          <p class="font-semibold text-sm text-[color:var(--ivory)]">${day.title}</p>
          <p class="text-[11px] text-[color:var(--ivory)]/40">${day.subtitle}</p>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <span class="chip" data-day-chip="${course.id}_${dayIdx}">${toPersianDigits(done)}/${toPersianDigits(total)}</span>
        <svg class="chevron w-3.5 h-3.5" style="color:var(--gold-soft)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 9l6 6 6-6"/>
        </svg>
      </div>
    </div>
    <div class="accordion-body" data-day-body="${course.id}_${dayIdx}">
      <div class="px-4 pb-4 pt-1 space-y-2">
        ${day.exercises.map((ex, exIdx)=>renderExercise(course.id, dayIdx, exIdx, ex)).join('')}
      </div>
    </div>
  `;
  return el;
}

function renderExercise(courseId, dayIdx, exIdx, ex){
  const id = exId(courseId, dayIdx, exIdx);
  const checked = !!state[id];
  return `
    <div class="rounded-xl border" style="border-color:var(--line); background:rgba(0,0,0,0.15)">
      <div class="flex items-start gap-3 p-3">
        <input type="checkbox" class="ex-checkbox mt-0.5" data-ex="${id}" ${checked ? 'checked' : ''}>
        <div class="flex-1 min-w-0">
          <div class="flex items-center justify-between gap-2 clickable ex-toggle" data-ex="${id}">
            <div class="min-w-0">
              <p class="font-semibold text-sm ${checked ? 'done-strike' : ''}" data-label="${id}">${ex.name}</p>
              <p class="text-xs text-[color:var(--sage)] mt-0.5">${ex.duration}</p>
            </div>
            <svg class="ex-chevron w-4 h-4 flex-shrink-0" style="color:var(--gold-soft)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M6 9l6 6 6-6"/>
            </svg>
          </div>
          <div class="ex-detail" data-detail="${id}">
            <div class="pt-3 text-xs leading-6 text-[color:var(--ivory)]/70 space-y-2">
              <p class="justify"><span class="text-[color:var(--gold)] font-medium">روش انجام: </span>${ex.howto}</p>
              <p class="justify"><span class="text-[color:var(--gold)] font-medium">فایده: </span>${ex.benefit}</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
}

function attachCourseListeners(){
  document.querySelectorAll('[data-course-toggle]').forEach(header=>{
    header.addEventListener('click', ()=>{
      const id = header.getAttribute('data-course-toggle');
      const body = document.querySelector(`[data-course-body="${id}"]`);
      const chevron = header.querySelector('.chevron');
      body.classList.toggle('open');
      chevron.classList.toggle('rot');
    });
  });
}
function attachDayListeners(){
  document.querySelectorAll('[data-day-toggle]').forEach(header=>{
    header.addEventListener('click', ()=>{
      const id = header.getAttribute('data-day-toggle');
      const body = document.querySelector(`[data-day-body="${id}"]`);
      const chevron = header.querySelector('.chevron');
      body.classList.toggle('open');
      chevron.classList.toggle('rot');
    });
  });
}
function attachExerciseListeners(){
  document.querySelectorAll('.ex-toggle').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      e.stopPropagation();
      const id = btn.getAttribute('data-ex');
      const detail = document.querySelector(`[data-detail="${id}"]`);
      detail.classList.toggle('open');
      btn.querySelector('.ex-chevron').classList.toggle('rot');
    });
  });
  document.querySelectorAll('.ex-checkbox').forEach(cb=>{
    cb.addEventListener('change', ()=>{
      const id = cb.getAttribute('data-ex');
      state[id] = cb.checked;
      saveJSON(STORAGE_KEY, state);
      const label = document.querySelector(`[data-label="${id}"]`);
      if(label) label.classList.toggle('done-strike', cb.checked);
      updateOverallRing();
      refreshCourseAndDay(id);
    });
  });
}
function attachDateListeners(){
  document.querySelectorAll('.start-date-input').forEach(input=>{
    input.addEventListener('change', ()=>{
      const courseId = input.getAttribute('data-course');
      if(!meta[courseId]) meta[courseId] = {};
      meta[courseId].start = input.value;
      saveJSON(META_KEY, meta);
      const course = COURSES.find(c=>c.id===courseId);
      const endLabelEl = document.querySelector(`[data-end-label="${courseId}"]`);
      if(input.value){
        const endDate = computeEndDate(input.value, course.days.length);
        endLabelEl.textContent = toJalaliStr(endDate);
      } else {
        endLabelEl.textContent = '—';
      }
    });
  });
}

function refreshCourseAndDay(id){
  const parts = id.split('_');
  const courseId = parts[0];
  const dayIdx = parseInt(parts[1].replace('d',''));
  const course = COURSES.find(c=>c.id===courseId);

  const {done, total} = dayProgress(course, dayIdx);
  const dayFull = done === total;
  const badge = document.querySelector(`[data-day-badge="${courseId}_${dayIdx}"]`);
  const chip = document.querySelector(`[data-day-chip="${courseId}_${dayIdx}"]`);
  if(badge){
    badge.style.borderColor = dayFull ? 'var(--gold)' : 'var(--line)';
    badge.style.background = dayFull ? 'rgba(201,162,75,0.15)' : 'rgba(255,255,255,0.02)';
    badge.querySelector('span').style.color = dayFull ? 'var(--gold)' : 'var(--ivory)';
  }
  if(chip) chip.textContent = `${toPersianDigits(done)}/${toPersianDigits(total)}`;

  const cTotal = courseTotal(course);
  const cDone = courseDone(course);
  const pct = cTotal ? Math.round((cDone/cTotal)*100) : 0;
  const courseHeader = document.querySelector(`[data-course-toggle="${courseId}"]`);
  const courseChip = courseHeader.querySelector('.chip');
  courseChip.textContent = toPersianDigits(pct) + '٪';
  const barFill = courseHeader.querySelector('.bar-fill');
  barFill.style.width = pct + '%';
}

renderJalaliDate();
renderCourses();
updateOverallRing();
</script>
